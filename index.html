<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>∞ Text Brush · Infinite Canvas</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body, html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #f0f4f8;
      touch-action: none;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    }

    #canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
      cursor: crosshair;
      background: white;
    }

    /* floating controls — minimal, hover above canvas */
    .floating-toolbar {
      position: fixed;
      bottom: 24px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      pointer-events: none;
      padding: 0 16px;
      z-index: 100;
    }

    .toolbar-container {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 60px;
      padding: 8px 12px;
      box-shadow: 0 12px 28px rgba(0,0,0,0.15), 0 2px 8px rgba(0,0,0,0.05);
      border: 1px solid rgba(255,255,255,0.5);
      pointer-events: auto;
      max-width: 600px;
      width: fit-content;
      margin: 0 auto;
      flex-wrap: wrap;
      justify-content: center;
    }

    #brushInput {
      flex: 2 1 140px;
      min-width: 120px;
      background: white;
      border: 1.5px solid #d1d9e6;
      border-radius: 48px;
      padding: 12px 16px;
      font-size: 1rem;
      font-weight: 500;
      color: #0b1e32;
      outline: none;
      transition: border 0.15s, box-shadow 0.15s;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
      font-family: inherit;
      -webkit-appearance: none;
    }

    #brushInput:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
    }

    .tool-btn {
      background: white;
      border: 1.5px solid #e2e8f0;
      border-radius: 48px;
      padding: 12px 16px;
      font-size: 1.2rem;
      font-weight: 600;
      color: #1e293b;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 8px rgba(0,0,0,0.02);
      transition: all 0.15s;
      white-space: nowrap;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      backdrop-filter: blur(4px);
      min-width: 48px;
    }

    .tool-btn.active {
      background: #3b82f6;
      border-color: #3b82f6;
      color: white;
    }

    .tool-btn:active {
      transform: scale(0.94);
    }

    #clearBtn {
      background: white;
    }

    /* emoji picker panel */
    .emoji-panel {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 36px;
      padding: 16px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 8px;
      z-index: 200;
      border: 1px solid rgba(255,255,255,0.8);
      max-width: 360px;
      width: 90%;
      pointer-events: auto;
    }

    .emoji-btn {
      background: transparent;
      border: none;
      font-size: 2rem;
      padding: 8px;
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.1s;
      touch-action: manipulation;
    }

    .emoji-btn:active {
      background: #e2e8f0;
    }

    /* color picker panel (OKLCH) */
    .color-panel {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 36px;
      padding: 20px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
      z-index: 200;
      border: 1px solid rgba(255,255,255,0.8);
      width: 320px;
      max-width: 90vw;
      pointer-events: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .slider-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .slider-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.9rem;
      font-weight: 500;
      color: #334155;
    }

    input[type="range"] {
      width: 100%;
      margin: 5px 0;
    }

    .color-preview {
      width: 100%;
      height: 50px;
      border-radius: 30px;
      border: 2px solid white;
      box-shadow: 0 4px 8px rgba(0,0,0,0.05);
    }

    .close-panel {
      align-self: flex-end;
      background: #f1f5f9;
      border: none;
      border-radius: 40px;
      padding: 8px 20px;
      font-weight: 600;
      cursor: pointer;
    }

    .hidden {
      display: none !important;
    }

    /* eraser indicator (circle) */
    .eraser-indicator {
      position: fixed;
      pointer-events: none;
      border: 2px dashed #ef4444;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      z-index: 150;
      background: rgba(239,68,68,0.05);
      transition: width 0.05s, height 0.05s;
    }

    @media (max-width: 480px) {
      .floating-toolbar {
        bottom: 16px;
      }
      .toolbar-container {
        padding: 6px 8px;
        gap: 6px;
      }
      .tool-btn {
        padding: 10px 12px;
        font-size: 1rem;
      }
      #brushInput {
        padding: 10px 12px;
      }
    }
  </style>
</head>
<body>

  <canvas id="canvas"></canvas>

  <!-- eraser cursor indicator (hidden by default) -->
  <div id="eraserIndicator" class="eraser-indicator hidden"></div>

  <!-- floating toolbar -->
  <div class="floating-toolbar">
    <div class="toolbar-container">
      <input type="text" id="brushInput" value="hello" placeholder="type…" autocomplete="off" autocorrect="off" spellcheck="false" enterkeyhint="done">
      <button id="emojiBtn" class="tool-btn" title="Emoji picker">😊</button>
      <button id="colorBtn" class="tool-btn" title="Color picker">🎨</button>
      <button id="eraserBtn" class="tool-btn" title="Eraser">🧽</button>
      <button id="clearBtn" class="tool-btn" title="Clear all">🧹</button>
    </div>
  </div>

  <!-- emoji picker panel -->
  <div id="emojiPanel" class="emoji-panel hidden">
    <!-- filled with common emojis via JS -->
  </div>

  <!-- OKLCH color picker panel -->
  <div id="colorPanel" class="color-panel hidden">
    <div class="slider-group">
      <div class="slider-label"><span>Lightness (L)</span><span id="lVal">0.7</span></div>
      <input type="range" id="lSlider" min="0" max="1" step="0.01" value="0.7">
    </div>
    <div class="slider-group">
      <div class="slider-label"><span>Chroma (C)</span><span id="cVal">0.15</span></div>
      <input type="range" id="cSlider" min="0" max="0.4" step="0.01" value="0.15">
    </div>
    <div class="slider-group">
      <div class="slider-label"><span>Hue (H)</span><span id="hVal">240</span></div>
      <input type="range" id="hSlider" min="0" max="360" step="1" value="240">
    </div>
    <div class="color-preview" id="colorPreview" style="background: #3b82f6;"></div>
    <button class="close-panel" id="closeColorPanel">Done</button>
  </div>

  <script>
    (function(){
      "use strict";

      // ----- elements -----
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');
      const brushInput = document.getElementById('brushInput');
      const clearBtn = document.getElementById('clearBtn');
      const emojiBtn = document.getElementById('emojiBtn');
      const emojiPanel = document.getElementById('emojiPanel');
      const colorBtn = document.getElementById('colorBtn');
      const colorPanel = document.getElementById('colorPanel');
      const eraserBtn = document.getElementById('eraserBtn');
      const eraserIndicator = document.getElementById('eraserIndicator');

      // ----- state -----
      let view = { scale: 1.0, offsetX: 0, offsetY: 0 };
      let stamps = [];            // { x, y, text, color }
      let isDrawing = false;
      let lastWorldX = 0, lastWorldY = 0;
      const MIN_STAMP_DIST = 22;
      
      let toolMode = 'brush';     // 'brush' or 'eraser'
      const ERASER_RADIUS = 25;   // world units
      
      let currentColor = '#3b82f6'; // default OKLCH color (L=0.7,C=0.15,H=240)
      
      // OKLCH sliders
      const lSlider = document.getElementById('lSlider');
      const cSlider = document.getElementById('cSlider');
      const hSlider = document.getElementById('hSlider');
      const lVal = document.getElementById('lVal');
      const cVal = document.getElementById('cVal');
      const hVal = document.getElementById('hVal');
      const colorPreview = document.getElementById('colorPreview');

      // Pan/zoom state
      let isPanning = false;
      let lastPanX = 0, lastPanY = 0;
      let initialPinchDist = 0;
      let initialScale = 1.0;
      let pinchCenterX = 0, pinchCenterY = 0;

      // ----- helper: screen to world -----
      function screenToWorld(screenX, screenY) {
        return {
          x: (screenX - view.offsetX) / view.scale,
          y: (screenY - view.offsetY) / view.scale
        };
      }

      // ----- redraw canvas (world space) -----
      function redrawCanvas() {
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.translate(view.offsetX, view.offsetY);
        ctx.scale(view.scale, view.scale);
        
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        // FIXED FONT SIZE in world units — scales with zoom
        ctx.font = `bold 32px system-ui, -apple-system, "Segoe UI", Roboto, sans-serif`;
        
        for (let s of stamps) {
          if (!s.text.trim()) continue;
          ctx.fillStyle = s.color || '#0f172a';
          ctx.fillText(s.text, s.x, s.y);
        }
        
        ctx.setTransform(1, 0, 0, 1, 0, 0);
      }

      // ----- add stamp (brush) -----
      function addStamp(worldX, worldY, force = false) {
        if (toolMode !== 'brush') return;
        const text = brushInput.value.trim();
        if (text === '') return;
        
        if (!force) {
          const dx = worldX - lastWorldX;
          const dy = worldY - lastWorldY;
          if (Math.sqrt(dx*dx + dy*dy) < MIN_STAMP_DIST) return;
        }
        
        stamps.push({ x: worldX, y: worldY, text: text, color: currentColor });
        lastWorldX = worldX;
        lastWorldY = worldY;
        redrawCanvas();
      }

      // ----- erase stamps within radius -----
      function eraseAt(worldX, worldY) {
        const before = stamps.length;
        stamps = stamps.filter(s => {
          const dx = s.x - worldX;
          const dy = s.y - worldY;
          return Math.sqrt(dx*dx + dy*dy) > ERASER_RADIUS;
        });
        if (stamps.length !== before) redrawCanvas();
      }

      // ----- pointer handling -----
      function getCanvasCoordFromEvent(e) {
        const rect = canvas.getBoundingClientRect();
        let clientX, clientY;
        if (e.touches) {
          if (e.touches.length === 0) return null;
          clientX = e.touches[0].clientX;
          clientY = e.touches[0].clientY;
        } else {
          clientX = e.clientX;
          clientY = e.clientY;
        }
        return { x: clientX - rect.left, y: clientY - rect.top };
      }

      function handleDrawStart(e) {
        e.preventDefault();
        const coord = getCanvasCoordFromEvent(e);
        if (!coord) return;
        const world = screenToWorld(coord.x, coord.y);
        isDrawing = true;
        lastWorldX = world.x;
        lastWorldY = world.y;
        
        if (toolMode === 'brush') addStamp(world.x, world.y, true);
        else if (toolMode === 'eraser') eraseAt(world.x, world.y);
      }

      function handleDrawMove(e) {
        if (!isDrawing) return;
        e.preventDefault();
        const coord = getCanvasCoordFromEvent(e);
        if (!coord) return;
        const world = screenToWorld(coord.x, coord.y);
        
        if (toolMode === 'brush') addStamp(world.x, world.y, false);
        else if (toolMode === 'eraser') eraseAt(world.x, world.y);
        
        // update eraser indicator position
        if (toolMode === 'eraser') updateEraserIndicator(coord.x, coord.y);
      }

      function handleDrawEnd(e) {
        if (isDrawing) {
          e.preventDefault();
          isDrawing = false;
        }
      }

      // ----- eraser cursor indicator -----
      function updateEraserIndicator(screenX, screenY) {
        if (toolMode !== 'eraser') {
          eraserIndicator.classList.add('hidden');
          return;
        }
        const radiusScreen = ERASER_RADIUS * view.scale;
        eraserIndicator.style.width = (radiusScreen * 2) + 'px';
        eraserIndicator.style.height = (radiusScreen * 2) + 'px';
        eraserIndicator.style.left = screenX + 'px';
        eraserIndicator.style.top = screenY + 'px';
        eraserIndicator.classList.remove('hidden');
      }

      function hideEraserIndicator() {
        eraserIndicator.classList.add('hidden');
      }

      // ----- pan & zoom -----
      function applyPan(dx, dy) {
        view.offsetX += dx;
        view.offsetY += dy;
        redrawCanvas();
      }

      function handleZoom(delta, centerX, centerY) {
        const zoomFactor = 1 - delta * 0.005;
        const newScale = Math.min(Math.max(view.scale * zoomFactor, 0.15), 6.0);
        const worldX = (centerX - view.offsetX) / view.scale;
        const worldY = (centerY - view.offsetY) / view.scale;
        view.scale = newScale;
        view.offsetX = centerX - worldX * view.scale;
        view.offsetY = centerY - worldY * view.scale;
        redrawCanvas();
      }

      // ----- touch events (gestures) -----
      function handleTouchStart(e) {
        e.preventDefault();
        const touches = e.touches;
        if (touches.length === 1) {
          if (!isPanning) {
            const coord = getCanvasCoordFromEvent(e);
            if (coord) {
              const world = screenToWorld(coord.x, coord.y);
              isDrawing = true;
              lastWorldX = world.x;
              lastWorldY = world.y;
              if (toolMode === 'brush') addStamp(world.x, world.y, true);
              else eraseAt(world.x, world.y);
            }
          }
        } else if (touches.length === 2) {
          isDrawing = false;
          isPanning = true;
          const t1 = touches[0], t2 = touches[1];
          const dx = t2.clientX - t1.clientX;
          const dy = t2.clientY - t1.clientY;
          initialPinchDist = Math.sqrt(dx*dx + dy*dy);
          initialScale = view.scale;
          const rect = canvas.getBoundingClientRect();
          const midX = (t1.clientX + t2.clientX)/2 - rect.left;
          const midY = (t1.clientY + t2.clientY)/2 - rect.top;
          pinchCenterX = midX; pinchCenterY = midY;
          lastPanX = midX; lastPanY = midY;
          hideEraserIndicator();
        }
      }

      function handleTouchMove(e) {
        e.preventDefault();
        const touches = e.touches;
        if (touches.length === 1 && isDrawing) {
          const coord = getCanvasCoordFromEvent(e);
          if (coord) {
            const world = screenToWorld(coord.x, coord.y);
            if (toolMode === 'brush') addStamp(world.x, world.y, false);
            else eraseAt(world.x, world.y);
            if (toolMode === 'eraser') updateEraserIndicator(coord.x, coord.y);
          }
        } else if (touches.length === 2) {
          isDrawing = false;
          const t1 = touches[0], t2 = touches[1];
          const rect = canvas.getBoundingClientRect();
          const midX = (t1.clientX + t2.clientX)/2 - rect.left;
          const midY = (t1.clientY + t2.clientY)/2 - rect.top;
          const panDx = midX - lastPanX;
          const panDy = midY - lastPanY;
          applyPan(panDx, panDy);
          
          const dx = t2.clientX - t1.clientX;
          const dy = t2.clientY - t1.clientY;
          const currentDist = Math.sqrt(dx*dx + dy*dy);
          if (initialPinchDist > 0) {
            const scaleChange = currentDist / initialPinchDist;
            const newScale = Math.min(Math.max(initialScale * scaleChange, 0.15), 6.0);
            const worldX = (pinchCenterX - view.offsetX) / view.scale;
            const worldY = (pinchCenterY - view.offsetY) / view.scale;
            view.scale = newScale;
            view.offsetX = pinchCenterX - worldX * view.scale;
            view.offsetY = pinchCenterY - worldY * view.scale;
            redrawCanvas();
          }
          lastPanX = midX; lastPanY = midY;
        }
      }

      function handleTouchEnd(e) {
        e.preventDefault();
        if (e.touches.length === 0) {
          isDrawing = false;
          isPanning = false;
          hideEraserIndicator();
        } else if (e.touches.length === 1) {
          if (isPanning) {
            isPanning = false;
            const coord = getCanvasCoordFromEvent(e);
            if (coord) {
              const world = screenToWorld(coord.x, coord.y);
              isDrawing = true;
              lastWorldX = world.x; lastWorldY = world.y;
              if (toolMode === 'brush') addStamp(world.x, world.y, true);
              else eraseAt(world.x, world.y);
            }
          }
        }
      }

      // ----- mouse events -----
      function handleMouseDown(e) {
        if (e.button === 1 || e.button === 2) {
          e.preventDefault();
          isPanning = true;
          isDrawing = false;
          const rect = canvas.getBoundingClientRect();
          lastPanX = e.clientX - rect.left;
          lastPanY = e.clientY - rect.top;
          canvas.style.cursor = 'grab';
          return;
        }
        if (e.button === 0) handleDrawStart(e);
      }

      function handleMouseMove(e) {
        const rect = canvas.getBoundingClientRect();
        const coord = { x: e.clientX - rect.left, y: e.clientY - rect.top };
        if (isPanning) {
          e.preventDefault();
          const dx = coord.x - lastPanX;
          const dy = coord.y - lastPanY;
          applyPan(dx, dy);
          lastPanX = coord.x; lastPanY = coord.y;
          canvas.style.cursor = 'grabbing';
        } else if (isDrawing) {
          handleDrawMove(e);
        }
        // update eraser indicator on mousemove even if not drawing
        if (toolMode === 'eraser') updateEraserIndicator(coord.x, coord.y);
        else hideEraserIndicator();
      }

      function handleMouseUp(e) {
        if (isPanning) {
          isPanning = false;
          canvas.style.cursor = 'crosshair';
        } else if (isDrawing) {
          handleDrawEnd(e);
        }
      }

      function handleWheel(e) {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const centerX = e.clientX - rect.left;
        const centerY = e.clientY - rect.top;
        handleZoom(e.deltaY > 0 ? 0.8 : -0.8, centerX, centerY);
      }

      // ----- OKLCH to RGB conversion (simplified, sRGB gamut mapping) -----
      function oklchToRgb(l, c, h) {
        // Convert OKLCH to OKLab
        const hRad = h * Math.PI / 180;
        const a = c * Math.cos(hRad);
        const b = c * Math.sin(hRad);
        
        // OKLab to linear sRGB
        const L_ = l + 0.3963377774 * a + 0.2158037573 * b;
        const M_ = l - 0.1055613458 * a - 0.0638541728 * b;
        const S_ = l - 0.0894841775 * a - 1.2914855480 * b;
        
        const L = L_ * L_ * L_;
        const M = M_ * M_ * M_;
        const S = S_ * S_ * S_;
        
        // Convert to linear RGB
        let r = 4.0767416621 * L - 3.3077115913 * M + 0.2309699292 * S;
        let g = -1.2684380046 * L + 2.6097574011 * M - 0.3413193965 * S;
        let b_ = -0.0041960863 * L - 0.7034186147 * M + 1.7076147010 * S;
        
        // Gamma correction (sRGB)
        const toSrgb = (x) => x <= 0.0031308 ? 12.92 * x : 1.055 * Math.pow(x, 1/2.4) - 0.055;
        r = Math.max(0, Math.min(1, toSrgb(r)));
        g = Math.max(0, Math.min(1, toSrgb(g)));
        b_ = Math.max(0, Math.min(1, toSrgb(b_)));
        
        return `#${((1 << 24) + (Math.round(r*255) << 16) + (Math.round(g*255) << 8) + Math.round(b_*255)).toString(16).slice(1)}`;
      }

      function updateColorFromSliders() {
        const l = parseFloat(lSlider.value);
        const c = parseFloat(cSlider.value);
        const h = parseFloat(hSlider.value);
        lVal.textContent = l.toFixed(2);
        cVal.textContent = c.toFixed(2);
        hVal.textContent = h;
        const hex = oklchToRgb(l, c, h);
        colorPreview.style.backgroundColor = hex;
        currentColor = hex;
      }

      // ----- UI initialization -----
      function initUI() {
        // Emoji picker
        const emojis = ['😀','😂','😍','🔥','✨','⭐','🎨','📝','❤️','👍','🌸','🐶','🐱','🌈','🍕','🎉','💡','🖌️','✏️','📌'];
        emojis.forEach(emoji => {
          const btn = document.createElement('button');
          btn.className = 'emoji-btn';
          btn.textContent = emoji;
          btn.addEventListener('click', () => {
            brushInput.value = emoji;
            emojiPanel.classList.add('hidden');
          });
          emojiPanel.appendChild(btn);
        });

        emojiBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          colorPanel.classList.add('hidden');
          emojiPanel.classList.toggle('hidden');
        });

        colorBtn.addEventListener('click', () => {
          emojiPanel.classList.add('hidden');
          colorPanel.classList.toggle('hidden');
        });

        document.getElementById('closeColorPanel').addEventListener('click', () => {
          colorPanel.classList.add('hidden');
        });

        // Sliders
        lSlider.addEventListener('input', updateColorFromSliders);
        cSlider.addEventListener('input', updateColorFromSliders);
        hSlider.addEventListener('input', updateColorFromSliders);
        updateColorFromSliders();

        // Eraser toggle
        eraserBtn.addEventListener('click', () => {
          toolMode = toolMode === 'brush' ? 'eraser' : 'brush';
          eraserBtn.classList.toggle('active', toolMode === 'eraser');
          if (toolMode === 'eraser') {
            // show indicator if mouse over canvas
          } else {
            hideEraserIndicator();
          }
        });

        clearBtn.addEventListener('click', () => {
          stamps = [];
          redrawCanvas();
        });

        // Close panels when clicking outside
        document.addEventListener('click', (e) => {
          if (!emojiPanel.contains(e.target) && e.target !== emojiBtn) {
            emojiPanel.classList.add('hidden');
          }
          if (!colorPanel.contains(e.target) && e.target !== colorBtn) {
            colorPanel.classList.add('hidden');
          }
        });

        brushInput.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') { e.preventDefault(); brushInput.blur(); }
        });
      }

      // ----- resize canvas -----
      function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        redrawCanvas();
      }

      // ----- bind events -----
      function bindEvents() {
        canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
        canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
        canvas.addEventListener('touchend', handleTouchEnd);
        canvas.addEventListener('touchcancel', handleTouchEnd);
        
        canvas.addEventListener('mousedown', handleMouseDown);
        window.addEventListener('mousemove', handleMouseMove);
        window.addEventListener('mouseup', handleMouseUp);
        canvas.addEventListener('wheel', handleWheel, { passive: false });
        canvas.addEventListener('contextmenu', (e) => e.preventDefault());
        
        window.addEventListener('resize', resizeCanvas);
      }

      // ----- initialize view -----
      function initView() {
        resizeCanvas();
        view.offsetX = canvas.width / 2;
        view.offsetY = canvas.height / 2;
        redrawCanvas();
      }

      // Start
      initUI();
      initView();
      bindEvents();

      // Hide eraser when leaving canvas
      canvas.addEventListener('mouseleave', hideEraserIndicator);
      
    })();
  </script>
</body>
</html>
